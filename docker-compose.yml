version: '2'
services:

  pythonsimo:
    build:
      context: .
      dockerfile: Dockerfile_pythonsimo
    expose:
      - "8888"
    links:
      - redis
    restart: always

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile_sandbox
    expose:
      - "3456"
    restart: always

  simojs:
    links:
     - redis
     - pythonsimo
     - influxdb
     - sandbox
    build: .
    extra_hosts:
    - "host.docker.internal:host-gateway"
    volumes:
      - "./simojs-data/:/simojs-data"
      - "./templates/:/templates"
    restart: always
    ports:
     - "127.0.0.1:9229:9229"

  # llama is excluded from the default `docker compose up` via the profile.
  # To start it, place a model file under ./models/ and run:
  #   docker compose --profile llama up
  # Used by !simogpt and !simoq features.
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    command: -m /models/viking-13b-q5_k_m.gguf -c 128 --host 0.0.0.0 --port 8111 --threads 8 --mlock
    volumes:
      - "./models:/models"
    ports:
      - "8111:8111"
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
    profiles:
      - llama

  redis:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile_redis
    volumes:
      - "./redis-data/:/redis-data"

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    volumes:
      - "./influxdb_data:/var/lib/influxdb"
